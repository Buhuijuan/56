spring:
  application:
    name: mycampus-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:true}
  datasource:
      url: ${APP_DB_URL}
      username: ${APP_DB_USERNAME}
      password: ${APP_DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:false}
      path: /h2-console

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-to-a-long-secret-key-for-dev-only-1234567890}
    access-token-expire-seconds: ${APP_JWT_ACCESS_TOKEN_EXPIRE_SECONDS:86400}
  avatar:
    storage-path: ${APP_AVATAR_STORAGE_PATH:uploads/avatars}
    public-path: ${APP_AVATAR_PUBLIC_PATH:/uploads/avatars}
  mail:
    enabled: ${APP_MAIL_ENABLED:true}
    mock-delivery: ${APP_MAIL_MOCK_DELIVERY:false}
    from-address: ${MAIL_FROM_ADDRESS:${spring.mail.username:}}
    from-name: ${MAIL_FROM_NAME:MyCampus}
  game:
    data-root: ${APP_GAME_DATA_ROOT:}
    classpath-root: ${APP_GAME_CLASSPATH_ROOT:game-config}
    clockin-dir: ${APP_GAME_CLOCKIN_DIR:ClockInEvents}
    story-max-rounds: ${APP_GAME_STORY_MAX_ROUNDS:3}

logging:
  level:
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
